name: ports
on: [push, pull_request]
permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - run: go vet ./...
      - run: go test -v ./...
      - run: go build -o /tmp/blescope-go .
      - name: smoke
        run: |
          /tmp/blescope-go ../../demos/01-basic/frontdoor_lock.json && exit 1 || true

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --verbose
      - run: cargo build --release
      - name: smoke
        run: |
          ./target/release/blescope ../../demos/01-basic/frontdoor_lock.json && exit 1 || true

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: typecheck
        run: npx tsc --noEmit
      - name: test
        run: node --test --experimental-strip-types

  javascript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --test

  perl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/perl
    steps:
      - uses: actions/checkout@v4
      # Perl + JSON::PP/Test::More ship with ubuntu-latest's system Perl.
      - run: perl -MJSON::PP -e 'print "JSON::PP ok\n"'
      - name: test
        run: perl blescope.t
      - name: smoke
        run: |
          perl blescope.pl ../../demos/01-basic/frontdoor_lock.json && exit 1 || true
          perl blescope.pl ../../demos/09-secure-lock/secure_deadbolt.json

  ruby:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/ruby
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: test
        run: ruby test_blescope.rb
      - name: smoke
        run: |
          ruby blescope.rb ../../demos/01-basic/frontdoor_lock.json && exit 1 || true
          ruby blescope.rb ../../demos/09-secure-lock/secure_deadbolt.json

  shell:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/shell
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck blescope.sh test_blescope.sh || true
      - name: test
        run: sh test_blescope.sh
      - name: smoke
        run: |
          sh blescope.sh ../../demos/01-basic/frontdoor_lock.json && exit 1 || true
          sh blescope.sh ../../demos/09-secure-lock/secure_deadbolt.json
